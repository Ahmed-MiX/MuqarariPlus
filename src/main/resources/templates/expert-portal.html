<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${content['expert.title']}">Expert Portal | Muqarari+</title>
</head>
<body th:replace="~{fragments/layout :: html}">

    <div th:fragment="main-content">

        <!-- ===== HEADER ===== -->
        <section class="text-white py-5" style="background-color: var(--primary-blue);">
            <div class="container py-3">
                <div class="row align-items-center">
                    <div class="col-md-8">
                        <h1 class="display-6 fw-bold mb-0" th:text="${content['expert.title']}">Welcome, Expert</h1>
                        <p class="text-white-50 mt-2 fs-5" th:text="${content['expert.subtitle']}">Enrich academic theory.</p>
                    </div>
                    <div class="col-md-4 text-md-end mt-4 mt-md-0 d-flex justify-content-md-end">
                        <div class="d-inline-flex align-items-center bg-white text-dark rounded-pill shadow-sm px-4 py-3">
                            <span class="fs-4 text-accent-orange me-3">🛡</span>
                            <div class="text-start">
                                <span class="d-block fw-bold fs-6" th:text="${content['expert.status.title']}">Status</span>
                                <span class="text-muted small fw-bold" th:text="${content['expert.status.pending']}">Pending</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="container py-5 mt-3">
            <div class="row g-5">

                <!-- Left: Verification + Enrichment Forms -->
                <div class="col-lg-8">

                    <!-- Identity Verification -->
                    <div class="card bg-white rounded-4 shadow-sm border-0 p-4 p-md-5 mb-5 border-start border-5 border-accent-orange">
                        <h2 class="h3 fw-bold text-primary-blue mb-3"
                            th:text="${content['expert.verify.title']}">Identity Verification</h2>
                        <p class="text-muted fs-5 mb-4"
                           th:text="${content['expert.verify.desc']}">Upload credentials.</p>

                        <form method="post" action="#" enctype="multipart/form-data">
                            <div class="mb-4">
                                <label class="form-label fw-bold text-dark fs-6"
                                       th:text="${content['expert.verify.cv']}">Upload CV</label>
                                <input type="file" name="cvurl"
                                       class="form-control form-control-lg bg-light border-0 shadow-sm" required>
                            </div>
                            <div class="mb-5">
                                <label class="form-label fw-bold text-dark fs-6"
                                       th:text="${content['expert.verify.linkedin']}">LinkedIn URL</label>
                                <input type="url" name="linkedinUrl"
                                       class="form-control form-control-lg bg-light border-0 shadow-sm"
                                       placeholder="https://linkedin.com/in/username" required>
                            </div>
                            <button type="submit"
                                    class="btn btn-accent btn-lg px-5 fw-bold shadow-sm rounded-pill w-100"
                                    th:text="${content['expert.verify.btn']}">Submit for Review</button>
                        </form>
                    </div>

                    <!-- Course Enrichment (Locked) -->
                    <div class="card bg-light rounded-4 shadow-sm border-0 p-4 p-md-5">
                        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                            <h2 class="h4 fw-bold text-primary-blue mb-0"
                                th:text="${content['expert.enrich.title']}">Submit Enrichment</h2>
                            <span class="badge bg-secondary rounded-pill px-3 py-2 text-white shadow-sm"
                                  th:text="${content['expert.enrich.locked']}">Locked</span>
                        </div>
                        <p class="text-muted mb-4 fst-italic"
                           th:text="${content['expert.enrich.locked_msg']}">Unlocks after verification.</p>

                        <form class="opacity-50 pe-none">
                            <div class="mb-4">
                                <label class="form-label fw-bold"
                                       th:text="${content['expert.enrich.course']}">Select Course</label>
                                <select class="form-select form-select-lg bg-white border-0 shadow-sm" disabled>
                                    <option>---------</option>
                                </select>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold"
                                       th:text="${content['expert.enrich.pillar1']}">Pillar 1</label>
                                <textarea rows="3" class="form-control bg-white border-0 shadow-sm"
                                          th:placeholder="${content['expert.enrich.hp1']}" disabled></textarea>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold"
                                       th:text="${content['expert.enrich.pillar2']}">Pillar 2</label>
                                <textarea rows="3" class="form-control bg-white border-0 shadow-sm"
                                          th:placeholder="${content['expert.enrich.hp2']}" disabled></textarea>
                            </div>
                            <button type="button" class="btn btn-primary btn-lg px-5 fw-bold rounded-pill" disabled
                                    th:text="${content['expert.enrich.btn']}">Submit</button>
                        </form>
                    </div>
                </div>

                <!-- Right: My Contributions -->
                <div class="col-lg-4">
                    <div class="card bg-white rounded-4 shadow-sm border-0 p-4 p-md-5">
                        <h3 class="h5 fw-bold text-secondary-teal border-bottom border-2 pb-3 mb-4"
                            th:text="${content['expert.contrib.title']}">My Contributions</h3>

                        <!-- Empty State -->
                        <div class="text-center py-5">
                            <div class="bg-light rounded-circle d-inline-flex justify-content-center align-items-center mb-3 text-muted"
                                 style="width: 80px; height: 80px;">
                                <span class="fs-1">📚</span>
                            </div>
                            <h4 class="h5 text-primary-blue fw-bold"
                                th:text="${content['expert.contrib.empty']}">No contributions yet.</h4>
                            <p class="text-muted small"
                               th:text="${content['expert.contrib.empty_msg']}">Enrichments will appear here.</p>
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </div>

</body>
</html>
