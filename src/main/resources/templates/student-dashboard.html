<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${content['student.title']}">My Dashboard | Muqarari+</title>
</head>
<body th:replace="~{fragments/layout :: html}">

    <div th:fragment="main-content">

        <!-- ===== HEADER ===== -->
        <section class="text-white py-5 position-relative overflow-hidden"
                 style="background-color: var(--primary-blue);">
            <div class="container py-4 position-relative z-1">
                <div class="row align-items-center">
                    <div class="col-md-8">
                        <span class="badge bg-white text-secondary-teal rounded-pill px-3 py-2 fw-bold shadow-sm mb-3"
                              th:text="${content['student.badge']}">Student Portal</span>
                        <h1 class="display-6 fw-bold mb-0" th:text="${content['student.title']}">My Learning Path</h1>
                        <p class="text-white-50 mt-2 fs-5" th:text="${content['student.subtitle']}">Track your courses.</p>
                    </div>
                    <div class="col-md-4 mt-4 mt-md-0">
                        <form th:action="@{/courses}" method="get" class="w-100">
                            <div class="input-group shadow-sm border-0 rounded-4 overflow-hidden bg-white">
                                <input type="text" name="search"
                                       class="form-control form-control-lg border-0 py-3"
                                       th:placeholder="${content['student.search']}">
                                <button type="submit" class="btn btn-primary px-4 fw-bold"
                                        style="background-color: var(--secondary-teal);">🔍</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>

        <section class="container py-5 mt-3">
            <div class="row g-5">

                <!-- My Learning Path -->
                <div class="col-lg-7">
                    <h2 class="h4 fw-bold text-primary-blue border-bottom border-3 border-secondary-teal pb-3 mb-4 d-inline-block"
                        th:text="${content['student.path.title']}">My Enrolled Courses</h2>

                    <div class="row row-cols-1 g-4">
                        <!-- Dynamic courses -->
                        <th:block th:if="${enrolledCourses != null and !enrolledCourses.isEmpty()}">
                            <div class="col" th:each="course : ${enrolledCourses}">
                                <div class="card bg-white rounded-4 shadow-sm border h-100 p-4 border-start border-4 border-secondary-teal">
                                    <h3 class="h5 fw-bold text-dark mb-2"
                                        th:text="${#locale.language == 'ar' ? course.nameAr : course.nameEn}">Course</h3>
                                    <p class="text-muted small mb-0">
                                        <span th:text="${course.code}">CODE</span> •
                                        <span th:text="${course.university}">University</span>
                                    </p>
                                </div>
                            </div>
                        </th:block>

                        <!-- Empty State -->
                        <div class="col" th:if="${enrolledCourses == null or enrolledCourses.isEmpty()}">
                            <div class="card bg-white rounded-4 shadow-sm border-0 h-100 p-5 text-center">
                                <div class="bg-light rounded-circle d-inline-flex justify-content-center align-items-center mb-4 mx-auto"
                                     style="width: 100px; height: 100px;">
                                    <span class="display-4 text-muted">🎓</span>
                                </div>
                                <h3 class="h5 fw-bold text-primary-blue mb-2"
                                    th:text="${content['student.path.empty']}">No courses yet.</h3>
                                <p class="text-muted fs-6 mb-4"
                                   th:text="${content['student.path.empty_msg']}">Browse the catalog.</p>
                                <a th:href="@{/courses}"
                                   class="btn btn-outline-primary btn-lg rounded-pill px-5 fw-bold mx-auto border-2 shadow-sm"
                                   th:text="${content['student.path.btn']}">Browse Catalog &rarr;</a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Industry Insights Feed -->
                <div class="col-lg-5 mt-5 mt-lg-0">
                    <div class="card bg-offwhite rounded-4 shadow-sm border-0 p-4 p-md-5 border-top border-4 border-accent-orange">
                        <h2 class="h5 fw-bold text-accent-orange border-bottom border-2 pb-3 mb-4 text-uppercase"
                            th:text="${content['student.feed.title']}">Industry Feed</h2>
                        <p class="text-muted fst-italic mb-4"
                           th:text="${content['student.feed.subtitle']}">Latest expert enrichments.</p>

                        <!-- Dynamic insights -->
                        <div class="d-flex flex-column gap-4">
                            <th:block th:if="${insights != null and !insights.isEmpty()}">
                                <div class="bg-white rounded p-4 border shadow-sm" th:each="insight : ${insights}">
                                    <div class="d-flex align-items-center mb-3">
                                        <div class="rounded-circle d-flex align-items-center justify-content-center fw-bold text-white shadow-sm me-3"
                                             style="width: 40px; height: 40px; background-color: var(--primary-blue);"
                                             th:text="${#strings.substring(insight.expertName,0,2)}">JS</div>
                                        <div>
                                            <strong class="d-block text-dark fs-6" th:text="${insight.expertName}">Name</strong>
                                        </div>
                                    </div>
                                    <p class="text-muted small mb-0 lh-sm" th:text="${insight.content}">Content...</p>
                                </div>
                            </th:block>

                            <!-- Empty State -->
                            <div class="text-center py-4" th:if="${insights == null or insights.isEmpty()}">
                                <p class="text-muted fw-bold"
                                   th:text="${content['student.feed.empty']}">No insights yet.</p>
                            </div>
                        </div>

                        <div class="text-center mt-4"
                             th:unless="${insights == null or insights.isEmpty()}">
                            <button class="btn btn-outline-secondary btn-sm rounded-pill px-4 fw-bold"
                                    th:text="${content['student.feed.btn']}">Load More</button>
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </div>

</body>
</html>
