<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${content['superadmin.title']}">Supreme Command | Muqarari+</title>
</head>
<body th:replace="~{fragments/layout :: html}">

    <div th:fragment="main-content">

        <!-- ===== HEADER ===== -->
        <section class="text-white py-5" style="background-color: var(--primary-blue);">
            <div class="container py-3">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                    <div>
                        <h1 class="display-6 fw-bold mb-0"
                            th:text="${content['superadmin.title']}">Supreme Command Center</h1>
                        <p class="text-white-50 mb-0 mt-2"
                           th:text="${content['superadmin.subtitle']}">Manage Administrator accounts.</p>
                    </div>
                    <span class="badge bg-danger rounded-pill px-4 py-2 fs-6 shadow-sm border border-light"
                          th:text="${content['superadmin.badge']}">SUPER ADMIN</span>
                </div>
            </div>
        </section>

        <!-- ===== MAIN AREA ===== -->
        <section class="container py-5 mt-3">

            <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}">Error</div>

            <!-- Generated Credentials Alert -->
            <div th:if="${newUsername}" class="alert alert-success shadow-sm" role="alert">
                <h4 class="alert-heading fw-bold" th:text="${content['superadmin.success']}">Admin Generated!</h4>
                <p th:text="${content['superadmin.success_msg']}">Copy these credentials now.</p>
                <hr>
                <p class="mb-0 fw-bold fs-5">
                    <span th:text="${content['superadmin.success_user']}">Username:</span>
                    <span class="bg-light px-2 rounded text-dark ms-2" th:text="${newUsername}"></span>
                </p>
                <p class="mb-0 fw-bold fs-5 mt-2">
                    <span th:text="${content['superadmin.success_pass']}">Password:</span>
                    <span class="bg-light px-2 rounded text-dark ms-2" th:text="${newPassword}"></span>
                </p>
            </div>

            <!-- Create Admin Form -->
            <div class="card bg-white rounded-4 shadow-sm border-0 p-4 p-md-5 mb-5 border-top border-4 border-secondary-teal">
                <h2 class="h4 fw-bold text-primary-blue border-bottom border-2 pb-3 mb-4"
                    th:text="${content['superadmin.create.title']}">Create New Administrator</h2>

                <form th:action="@{/super-admin/create-admin}" method="post">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label fw-bold small"
                                   th:text="${content['superadmin.create.firstname']}">First Name</label>
                            <input type="text" name="firstName" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold small"
                                   th:text="${content['superadmin.create.lastname']}">Last Name</label>
                            <input type="text" name="lastName" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold small"
                                   th:text="${content['superadmin.create.email']}">Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                    </div>
                    <div class="mt-4 text-end">
                        <button type="submit"
                                class="btn btn-primary px-5 fw-bold shadow-sm rounded-pill"
                                style="background-color: var(--secondary-teal);"
                                th:text="${content['superadmin.create.btn']}">Generate Credentials</button>
                    </div>
                </form>
            </div>

            <!-- Admins Fleet Table -->
            <div class="card bg-white rounded-4 shadow-sm border-0 p-4 p-md-5">
                <h2 class="h4 fw-bold text-accent-orange border-bottom border-2 pb-3 mb-4"
                    th:text="${content['superadmin.fleet.title']}">Active Fleet</h2>

                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead class="table-light">
                            <tr>
                                <th class="py-3 px-4" th:text="${content['superadmin.fleet.name']}">Name</th>
                                <th class="py-3 px-4" th:text="${content['superadmin.fleet.email']}">Email</th>
                                <th class="py-3 px-4" th:text="${content['superadmin.fleet.username']}">Username</th>
                                <th class="py-3 px-4 text-end" th:text="${content['superadmin.fleet.action']}">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="admin : ${admins}">
                                <td class="py-3 px-4 fw-semibold text-dark"
                                    th:text="${admin.firstName + ' ' + admin.lastName}">Name</td>
                                <td class="py-3 px-4 text-muted" th:text="${admin.email}">Email</td>
                                <td class="py-3 px-4 text-primary-blue fw-bold" th:text="${admin.username}">admin1234</td>
                                <td class="py-3 px-4 text-end">
                                    <form th:action="@{/super-admin/delete-admin}" method="post"
                                          th:data-confirm="${content['superadmin.fleet.delete_confirm']}"
                                          onsubmit="return confirm(this.getAttribute('data-confirm'));">
                                        <input type="hidden" name="adminId" th:value="${admin.id}"/>
                                        <button type="submit"
                                                class="btn btn-sm btn-danger rounded-pill px-4 shadow-sm border-0"
                                                style="background-color: var(--accent-orange);"
                                                th:text="${content['superadmin.fleet.delete']}">Revoke</button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${admins == null or #lists.isEmpty(admins)}">
                                <td colspan="4" class="text-center py-4 text-muted fst-italic"
                                    th:text="${content['superadmin.fleet.empty']}">No admins.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </section>
    </div>

</body>
</html>
