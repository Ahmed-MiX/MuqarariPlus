<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login | مقرري+</title>
</head>
<body th:replace="~{fragments/layout :: html}">

    <div th:fragment="main-content" class="container" style="max-width: 500px; padding: 5rem 0;">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-5">
                <h2 class="text-center mb-4" style="color: var(--primary-blue);" th:text="#{nav.login}">Login</h2>
                
                <div th:if="${param.error}" class="alert alert-danger" role="alert">
                    Invalid email or password.
                </div>
                <div th:if="${param.logout}" class="alert alert-success" role="alert">
                    You have been logged out successfully.
                </div>
                 <div th:if="${param.registered}" class="alert alert-success" role="alert">
                    Registration successful! Please login.
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-4">
                        <label class="form-label font-weight-bold" th:text="#{nav.email_or_username}">Email or Username</label>
                        <input type="text" id="username" name="username" class="form-control form-control-lg" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label font-weight-bold">Password</label>
                        <input type="password" id="password" name="password" class="form-control form-control-lg" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 btn-lg mb-3" style="background-color: var(--primary-blue); border-color: var(--primary-blue);" th:text="#{nav.login}">Login</button>
                    
                    <div class="text-center">
                        <span class="text-muted">Don't have an account?</span> 
                        <a th:href="@{/register}" style="color: var(--secondary-teal); font-weight: 600;" th:text="#{nav.register}">Register Here</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
