<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${content['register.title']}">Register | Muqarari+</title>
</head>
<body th:replace="~{fragments/layout :: html}">

    <div th:fragment="main-content"
         class="container d-flex justify-content-center align-items-center flex-grow-1"
         style="min-height: 80vh;">
        <div class="card shadow-lg border-0 rounded-4 w-100" style="max-width: 600px;">
            <div class="card-body p-5">
                <h2 class="text-center mb-4 fw-bold"
                    style="color: var(--primary-blue);"
                    th:text="${content['register.title']}">Create an Account</h2>

                <div th:if="${error}" class="alert alert-danger" role="alert"
                     th:text="${error}">Registration failed.</div>

                <form th:action="@{/register}" th:object="${userDto}" method="post">
                    <div class="row g-3">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold"
                                   th:text="${content['register.first_name']}">First Name</label>
                            <input type="text" th:field="*{firstName}" class="form-control"
                                   th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid' : ''"
                                   required>
                            <div class="invalid-feedback fw-bold"
                                 th:if="${#fields.hasErrors('firstName')}"
                                 th:errors="*{firstName}">Error</div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold"
                                   th:text="${content['register.last_name']}">Last Name</label>
                            <input type="text" th:field="*{lastName}" class="form-control"
                                   th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid' : ''"
                                   required>
                            <div class="invalid-feedback fw-bold"
                                 th:if="${#fields.hasErrors('lastName')}"
                                 th:errors="*{lastName}">Error</div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold"
                               th:text="${content['register.email']}">Email Address</label>
                        <input type="email" th:field="*{email}" class="form-control form-control-lg"
                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                               required>
                        <div class="invalid-feedback fw-bold text-danger"
                             th:if="${#fields.hasErrors('email')}"
                             th:errors="*{email}">Error</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold"
                               th:text="${content['register.password']}">Secure Password</label>
                        <input type="password" th:field="*{password}" class="form-control form-control-lg"
                               th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"
                               required>
                        <div class="invalid-feedback fw-bold text-danger"
                             th:if="${#fields.hasErrors('password')}"
                             th:errors="*{password}">Error</div>
                        <small class="text-muted d-block mt-1"
                               th:text="${content['register.password_hint']}">8+ chars.</small>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold"
                               th:text="${content['register.role']}">Account Role</label>
                        <select th:field="*{role}" class="form-select form-select-lg">
                            <option value="ROLE_STUDENT"
                                    th:text="${content['register.role.student']}">Student</option>
                            <option value="ROLE_EXPERT"
                                    th:text="${content['register.role.expert']}">Industry Expert</option>
                        </select>
                    </div>

                    <button type="submit"
                            class="btn btn-primary w-100 btn-lg mb-3"
                            style="background-color: var(--accent-orange); border-color: var(--accent-orange);"
                            th:text="${content['register.submit']}">Register Now</button>

                    <div class="text-center">
                        <span class="text-muted"
                              th:text="${content['register.have_account']}">Already have an account?</span>
                        <a th:href="@{/login}"
                           style="color: var(--primary-blue); font-weight: 600;"
                           th:text="${content['nav.login']}">Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
