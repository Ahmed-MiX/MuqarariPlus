<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${#locale.language == 'ar' ? 'إدارة الكليات | Muqarari+' : 'Manage Colleges | Muqarari+'}">Manage Colleges | Muqarari+</title>
</head>
<body th:replace="~{fragments/layout :: html}">

    <div th:fragment="main-content">

        <section class="text-white py-5" style="background: linear-gradient(135deg, #0A192F 0%, #1a3a5c 50%, #00B4D8 100%);">
            <div class="container py-3">
                <nav aria-label="breadcrumb" class="mb-2">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a th:href="@{/admin}" class="text-white-50 text-decoration-none" th:text="${#locale.language == 'ar' ? 'لوحة الإدارة' : 'Admin Dashboard'}">Admin Dashboard</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/admin/academic}" class="text-white-50 text-decoration-none" th:text="${#locale.language == 'ar' ? 'الهيكل الأكاديمي' : 'Academic Structure'}">Academic Structure</a></li>
                        <li class="breadcrumb-item active text-white" th:text="${#locale.language == 'ar' ? 'الكليات' : 'Colleges'}">Colleges</li>
                    </ol>
                </nav>
                <h1 class="display-6 fw-bold mb-0 text-white">
                    <span th:text="${#locale.language == 'ar' ? '🏫 إدارة الكليات' : '🏫 Manage Colleges'}">🏫 Manage Colleges</span>
                </h1>
            </div>
        </section>

        <section class="container py-5 mt-3">

            <div th:if="${successMsg}" class="alert alert-success border-0 rounded-4 shadow-sm p-4 mb-4 d-flex align-items-center" role="alert">
                <span class="fs-3 me-3">✅</span>
                <span class="fw-semibold" th:text="${successMsg}"></span>
            </div>

            <div th:if="${errorMsg}" class="alert alert-danger border-0 rounded-4 shadow-sm p-4 mb-4 d-flex align-items-center" role="alert">
                <span class="fs-3 me-3">⛔</span>
                <span class="fw-semibold" th:text="${errorMsg}"></span>
            </div>

            <div th:if="${#lists.isEmpty(universities)}" class="card bg-warning bg-opacity-10 border-warning rounded-4 shadow-sm p-4 mb-4">
                <span th:text="${#locale.language == 'ar' ? '⚠️ يجب إضافة جامعة أولاً قبل إضافة كلية.' : '⚠️ You must add a university before adding a college.'}">⚠️ You must add a university before adding a college.</span>
                <a th:href="@{/admin/academic/universities}" class="btn btn-sm btn-outline-warning rounded-pill mt-2 w-fit"
                   th:text="${#locale.language == 'ar' ? 'إدارة الجامعات' : 'Manage Universities'}">Manage Universities</a>
            </div>

            <div class="card bg-white rounded-4 shadow-sm border-0 mb-4">
                <div class="card-header bg-white border-bottom p-4">
                    <h5 class="fw-bold text-primary-blue mb-0"
                        th:text="${editingCollege != null ? (#locale.language == 'ar' ? 'تعديل كلية' : 'Edit College') : (#locale.language == 'ar' ? 'إضافة كلية جديدة' : 'Add New College')}">Add New College</h5>
                </div>
                <div class="card-body p-4">
                    <form th:action="${editingCollege != null} ? @{'/admin/academic/colleges/' + ${editingCollege.id} + '/update'} : @{'/admin/academic/colleges/create'}" method="post">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label fw-semibold" th:text="${#locale.language == 'ar' ? 'الجامعة' : 'University'}">University</label>
                                <select name="universityId" class="form-select rounded-3" required>
                                    <option value="" th:text="${#locale.language == 'ar' ? 'اختر جامعة...' : 'Select university...'}">Select university...</option>
                                    <option th:each="u : ${universities}" th:value="${u.id}" th:text="${#locale.language == 'ar' ? u.nameAr : u.nameEn}"
                                            th:selected="${editingCollege != null && editingCollege.university != null && editingCollege.university.id == u.id}"></option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-semibold" th:text="${#locale.language == 'ar' ? 'الاسم بالإنجليزية' : 'Name (English)'}">Name (English)</label>
                                <input type="text" name="nameEn" class="form-control rounded-3" required
                                       th:value="${editingCollege != null} ? ${editingCollege.nameEn} : ''">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-semibold" th:text="${#locale.language == 'ar' ? 'الاسم بالعربية' : 'Name (Arabic)'}">Name (Arabic)</label>
                                <input type="text" name="nameAr" class="form-control rounded-3" required
                                       th:value="${editingCollege != null} ? ${editingCollege.nameAr} : ''">
                            </div>
                            <div class="col-md-2 d-flex align-items-end gap-2">
                                <button type="submit" class="btn btn-primary fw-bold rounded-pill shadow-sm w-100"
                                        th:text="${editingCollege != null ? (#locale.language == 'ar' ? 'تحديث' : 'Update') : (#locale.language == 'ar' ? 'إضافة' : 'Add')}">Add</button>
                                <a th:if="${editingCollege != null}" th:href="@{/admin/academic/colleges}" class="btn btn-outline-secondary rounded-pill">✕</a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card bg-white rounded-4 shadow-sm border-0 overflow-hidden">
                <div class="card-header bg-white border-bottom p-4">
                    <h5 class="fw-bold text-primary-blue mb-0"
                        th:text="${#locale.language == 'ar' ? 'الكليات الموجودة' : 'Existing Colleges'}">Existing Colleges</h5>
                </div>
                <div th:if="${#lists.isEmpty(colleges)}" class="text-center py-5">
                    <span class="fs-1">📭</span>
                    <p class="text-muted mt-2" th:text="${#locale.language == 'ar' ? 'لا توجد كليات بعد.' : 'No colleges yet.'}">No colleges yet.</p>
                </div>
                <div th:unless="${#lists.isEmpty(colleges)}" class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light">
                            <tr>
                                <th th:text="${#locale.language == 'ar' ? 'الاسم (EN)' : 'Name (EN)'}">Name (EN)</th>
                                <th th:text="${#locale.language == 'ar' ? 'الاسم (AR)' : 'Name (AR)'}">Name (AR)</th>
                                <th th:text="${#locale.language == 'ar' ? 'الجامعة' : 'University'}">University</th>
                                <th th:text="${#locale.language == 'ar' ? 'التخصصات' : 'Majors'}">Majors</th>
                                <th th:text="${#locale.language == 'ar' ? 'إجراءات' : 'Actions'}">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="college : ${colleges}">
                                <td class="fw-semibold" th:text="${college.nameEn}"></td>
                                <td th:text="${college.nameAr}"></td>
                                <td th:text="${college.university != null} ? ${#locale.language == 'ar' ? college.university.nameAr : college.university.nameEn} : '—'"></td>
                                <td><span class="badge bg-info rounded-pill" th:text="${college.majors != null ? #lists.size(college.majors) : 0}">0</span></td>
                                <td>
                                    <div class="d-flex gap-2">
                                        <a th:href="@{/admin/academic/colleges(editId=${college.id})}"
                                           class="btn btn-sm btn-outline-primary rounded-pill"
                                           th:text="${#locale.language == 'ar' ? 'تعديل' : 'Edit'}">Edit</a>
                                        <form th:action="@{'/admin/academic/colleges/' + ${college.id} + '/delete'}" method="post" class="d-inline">
                                            <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill"
                                                    onclick="return confirm(this.dataset.confirmMsg)"
                                                    th:data-confirm-msg="${#locale.language == 'ar' ? 'هل أنت متأكد؟ لا يمكن التراجع عن هذا الإجراء.' : 'Are you sure? This action cannot be undone.'}"
                                                    th:text="${#locale.language == 'ar' ? 'حذف' : 'Delete'}">Delete</button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="text-center mt-5">
                <a th:href="@{/admin/academic}" class="btn btn-outline-secondary btn-lg px-5 fw-bold rounded-pill shadow-sm">
                    <span th:text="${#locale.language == 'ar' ? '← العودة للهيكل الأكاديمي' : '→ Back to Academic Structure'}">→ Back to Academic Structure</span>
                </a>
            </div>

        </section>
    </div>

</body>
</html>
